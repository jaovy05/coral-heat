{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoramento Marinho</title>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <!-- Leaflet CSS (Imported via CDN) -->
    <link rel="stylesheet" href="{% static 'coral/css/leaflet.min.css' %}" />
    <link rel="stylesheet" href="{% static 'coral/css/index.css' %}" />
    <link rel="stylesheet" href="{% static 'coral/css/mapa-ui.css' %}" />
    <link rel="stylesheet" href="{% static 'coral/css/media-mes-modal.css' %}" />
    <link rel="stylesheet" href="{% static 'coral/css/header.css' %}" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  {% include 'partials/header.html' %}

  <!-- CONTAINER DO MAPA -->
    <div id="map-container">
    
        <!-- Painel de Legenda / Escala Cromática (Canto Inferior Esquerdo) -->
        <div class="oceanic-floating-panel panel-legend">
            <div class="panel-title" style="margin-bottom: 4px;">
                <i data-lucide="waves" style="width: 12px; height: 12px;"></i>
                Gradiente de Temperatura
            </div>
            <div class="thermal-gradient-bar"></div>
            <div style="display: flex; justify-content: space-between; font-size: 9px; font-family: monospace; color: #94a3b8;">
                <span id="legend-min">Min -- °C</span>
                <span>Normalizado</span>
                <span id="legend-max">Max -- °C</span>
            </div>
        </div>

        <!-- Modal de Média Mensal -->
        <div id="media-mes-modal" class="reef-modal" aria-hidden="true" role="dialog" aria-modal="true">
            <div class="reef-modal__dialog">
                <div class="reef-modal__header">
                    <div>
                        <div id="media-mes-modal-title" class="reef-modal__title">Dados do mês</div>
                        <div id="media-mes-modal-subtitle" class="reef-modal__subtitle">Selecione um recife para ver as médias.</div>
                    </div>
                    <button class="reef-modal__close" type="button" onclick="fecharModalMediaMes()" aria-label="Fechar modal">
                        <i data-lucide="x" style="width: 16px; height: 16px;"></i>
                    </button>
                </div>
                <div id="media-mes-modal-body" class="reef-modal__content">
                    <div class="modal-loading">Clique em um recife para carregar os dados.</div>
                </div>
            </div>
        </div>

    </div>

    {{ recifes|json_script:"recifes-data" }} 

    <!-- Carregamento de Bibliotecas Base -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
    
    <!-- MÓDULOS DE JS (Importados na ordem correta de dependência) -->
    <script src="{% static 'coral/js/heat.js' %}"></script>
    <script src="{% static 'coral/js/media-mes-modal.js' %}"></script>
    <script src="{% static 'coral/js/regioes.js' %}"></script>
    <script src="{% static 'coral/js/mapa.js' %}"></script>

    <script>
        // Inicializa os ícones decorativos da UI
        lucide.createIcons();
    </script>
</body>
</html>
