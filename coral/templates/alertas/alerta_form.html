{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% if object %}Editar{% else %}Novo{% endif %} Alerta — CoralHeat</title>
  <link rel="stylesheet" href="{% static 'coral/css/alertas.css' %}" />
  <link rel="stylesheet" href="{% static 'coral/css/media-mes-modal.css' %}" />
</head>
<body>
  {% include 'partials/header.html' %}

  <main class="alertas-panel__body" style="max-width: 640px; margin: 100px auto 40px; padding: 0 20px;">
    <section class="alerta-form-card">
      <h1 style="color: #fff; margin: 0 0 16px;">{% if object %}Editar alerta{% else %}Novo alerta{% endif %}</h1>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <label class="alerta-field" style="margin-bottom: 12px;">
            <span>{{ field.label }}</span>
            {{ field }}
            {% if field.errors %}<span class="alertas-feedback--error">{{ field.errors.0 }}</span>{% endif %}
          </label>
        {% endfor %}
        <div class="alerta-form-actions">
          <button type="submit" class="alerta-btn alerta-btn--primary">Salvar</button>
          <a href="{% url 'alerta-list' %}" class="alerta-btn alerta-btn--ghost" style="text-decoration: none; display: inline-flex; align-items: center;">Cancelar</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
