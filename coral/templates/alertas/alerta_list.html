{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meus Alertas — CoralHeat</title>
  <link rel="stylesheet" href="{% static 'coral/css/alertas.css' %}" />
  <link rel="stylesheet" href="{% static 'coral/css/media-mes-modal.css' %}" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  {% include 'partials/header.html' %}

  <main style="padding-top: 100px; text-align: center; color: #eaf7ff;">
    <p>Carregando painel de alertas...</p>
    <p><a href="{% url 'index' %}" style="color: #4cd7ff;">Voltar ao mapa</a></p>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof abrirPainelAlertas === 'function') {
        abrirPainelAlertas();
      }
      if (window.lucide?.createIcons) {
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
