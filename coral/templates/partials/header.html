{% load static %}
<header class="site-header">
  <link rel="stylesheet" href="{% static 'coral/css/header.css' %}">

  <div class="container">
    <div class="brand">
      <a href="{% url 'index' %}" aria-label="Início">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2"/></svg>
        CoralHeat
      </a>
    </div>

    <nav class="nav">
      <a href="{% url 'sobre' %}">Início</a>
      <a href="{% url 'index' %}" class="btn-mapa">Mapa Global</a>
      <a href="{% url 'contato' %}">Contato</a>
    </nav>

    <div class="actions">
      {% if user.is_authenticated %}
        <div class="user-dropdown">
          <button class="user-btn" id="userMenuBtn">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <div class="dropdown-menu" id="userDropdown">
            <a href="{% url 'user-update' %}" class="dropdown-item">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              Editar Perfil
            </a>
            <a href="{% url 'relatos-list' %}" class="dropdown-item">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
              Mensagens
            </a>
            <hr class="dropdown-divider">
            <a href="{% url 'logout' %}" class="dropdown-item logout">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              Sair
            </a>
          </div>
        </div>
      {% else %}
        <a href="{% url 'login' %}" class="btn-signin">Entrar</a>
      {% endif %}
    </div>
  </div>
</header>

<script>
  document.getElementById('userMenuBtn')?.addEventListener('click', function() {
    const dropdown = document.getElementById('userDropdown');
    dropdown.classList.toggle('show');
  });

  document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('userDropdown');
    const userBtn = document.getElementById('userMenuBtn');
    if (dropdown && !dropdown.contains(event.target) && event.target !== userBtn && !userBtn?.contains(event.target)) {
      dropdown.classList.remove('show');
    }
  });
</script>
